<title>Bradken Global Equipment Calibration System</title>
<style>
  /* ================= DESIGN TOKENS — Bradken brand ================= */
  :root{
    --bg:#eef1f3;
    --surface:#ffffff;
    --surface-alt:#f4f6f8;
    --border:#dbe0e4;
    --border-strong:#bcc5cc;
    --text:#181f26;
    --text-dim:#4c5560;
    --text-faint:#818b93;

    --brand:#005293;
    --brand-dark:#013f70;
    --brand-light:#e6eef6;
    --brand-contrast:#ffffff;
    --logo-blue:#005293;

    --gray:#7a7a7a;
    --gray-dark:#54595f;

    --ok:#1f7a44;    --ok-bg:#e3f3e8;   --ok-border:#a8d8ba;
    --warn:#a3660a;  --warn-bg:#faecd7; --warn-border:#e9be82;
    --crit:#b3261e;  --crit-bg:#fbe1df; --crit-border:#e7a8a3;
    --oos:#5b5580;   --oos-bg:#eae7f3;  --oos-border:#c2bcd9;

    --radius:8px;
    --radius-sm:5px;
    --shadow-sm:0 1px 2px rgba(15,25,35,.06);
    --shadow-md:0 8px 24px rgba(15,25,35,.12);
    --shadow-modal:0 14px 46px rgba(5,10,16,.35);

    --font-ui: -apple-system,"Segoe UI","Helvetica Neue",Arial,sans-serif;
    --font-mono: ui-monospace,"Cascadia Mono","SF Mono","Consolas","Roboto Mono",monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0c1116; --surface:#141b22; --surface-alt:#101620; --border:#26313b; --border-strong:#374553;
      --text:#e7edf2; --text-dim:#a7b3bc; --text-faint:#72808a;
      --brand:#3b93d6; --brand-dark:#69b1e3; --brand-light:#12293b; --brand-contrast:#04141f; --logo-blue:#4098db;
      --gray:#98a0a6; --gray-dark:#c3c9cd;
      --ok:#5fc788; --ok-bg:#12321f; --ok-border:#245c3a;
      --warn:#e2ac52; --warn-bg:#3a2a10; --warn-border:#6b4c1a;
      --crit:#f0847c; --crit-bg:#3a1613; --crit-border:#6e2b25;
      --oos:#b3a6e0; --oos-bg:#241f3a; --oos-border:#453a6e;
      --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 8px 28px rgba(0,0,0,.5); --shadow-modal:0 14px 50px rgba(0,0,0,.6);
    }
  }
  :root[data-theme="dark"]{
    --bg:#0c1116; --surface:#141b22; --surface-alt:#101620; --border:#26313b; --border-strong:#374553;
    --text:#e7edf2; --text-dim:#a7b3bc; --text-faint:#72808a;
    --brand:#3b93d6; --brand-dark:#69b1e3; --brand-light:#12293b; --brand-contrast:#04141f; --logo-blue:#4098db;
    --gray:#98a0a6; --gray-dark:#c3c9cd;
    --ok:#5fc788; --ok-bg:#12321f; --ok-border:#245c3a;
    --warn:#e2ac52; --warn-bg:#3a2a10; --warn-border:#6b4c1a;
    --crit:#f0847c; --crit-bg:#3a1613; --crit-border:#6e2b25;
    --oos:#b3a6e0; --oos-bg:#241f3a; --oos-border:#453a6e;
  }
  :root[data-theme="light"]{
    --bg:#eef1f3; --surface:#ffffff; --surface-alt:#f4f6f8; --border:#dbe0e4; --border-strong:#bcc5cc;
    --text:#181f26; --text-dim:#4c5560; --text-faint:#818b93;
    --brand:#005293; --brand-dark:#013f70; --brand-light:#e6eef6; --brand-contrast:#ffffff; --logo-blue:#005293;
    --gray:#7a7a7a; --gray-dark:#54595f;
    --ok:#1f7a44; --ok-bg:#e3f3e8; --ok-border:#a8d8ba;
    --warn:#a3660a; --warn-bg:#faecd7; --warn-border:#e9be82;
    --crit:#b3261e; --crit-bg:#fbe1df; --crit-border:#e7a8a3;
    --oos:#5b5580; --oos-bg:#eae7f3; --oos-border:#c2bcd9;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--font-ui);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  #app{min-height:100vh;}
  ::selection{background:var(--brand);color:var(--brand-contrast);}
  button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;}
  .mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
  h1,h2,h3,h4{text-wrap:balance;margin:0;}
  button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--brand);outline-offset:1px;}

  /* ================= HEADER ================= */
  .header{
    display:flex;align-items:center;gap:16px;padding:10px 24px;background:var(--surface);
    border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);position:sticky;top:0;z-index:30;
    flex-wrap:wrap;
  }
  .logo-lockup{display:flex;align-items:center;gap:10px;flex:none;}
  .logo-mark{width:38px;height:38px;flex:none;display:inline-flex;align-items:center;justify-content:center;background:#ffffff;border-radius:6px;overflow:hidden;box-shadow:0 0 0 1px var(--border);}
  .logo-mark img{width:100%;height:100%;object-fit:contain;display:block;}
  .logo-text b{display:block;font-size:17px;font-weight:800;letter-spacing:1.5px;color:var(--gray-dark);line-height:1.1;}
  .logo-text span{display:block;font-size:9.5px;letter-spacing:.6px;color:var(--text-faint);text-transform:uppercase;margin-top:1px;}
  .header-spacer{flex:1;}
  .header-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .site-select-wrap,.lang-select-wrap{display:flex;flex-direction:column;gap:2px;}
  .site-select-wrap label,.lang-select-wrap label{font-size:9.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-faint);font-weight:700;padding-left:1px;}
  .site-select,.lang-select{
    border:1.5px solid var(--brand);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);
    padding:7px 10px;font-weight:600;cursor:pointer;
  }
  .site-select{min-width:230px;}
  .lang-select{min-width:140px;}
  .reminder-banner{font-size:11px;color:var(--text-faint);padding:10px 18px;background:var(--surface-alt);border-bottom:1px solid var(--border);}
  @media (max-width:820px){ .header-right{width:100%;justify-content:space-between;} }

  /* ================= SHELL ================= */
  .shell-body{display:grid;grid-template-columns:212px 1fr;min-height:calc(100vh - 60px);}
  @media (max-width:880px){ .shell-body{grid-template-columns:1fr;} }
  .sidebar{background:var(--surface-alt);border-right:1px solid var(--border);padding:16px 10px;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;}
  @media (max-width:880px){ .sidebar{position:relative;top:0;height:auto;display:flex;overflow-x:auto;padding:8px 10px;gap:4px;} }
  .nav{display:flex;flex-direction:column;gap:3px;}
  @media (max-width:880px){ .nav{flex-direction:row;} }
  .nav-item{
    display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--radius-sm);background:transparent;
    border:1px solid transparent;border-left:3px solid transparent;color:var(--text-dim);cursor:pointer;text-align:left;
    width:100%;font-size:12.5px;font-weight:600;white-space:nowrap;
  }
  .nav-item:hover{background:var(--surface);color:var(--text);}
  .nav-item.active{background:var(--brand-light);color:var(--brand);border-left-color:var(--brand);}
  .nav-item .ic{width:16px;height:16px;flex:none;}
  .main{min-width:0;}
  .view{padding:20px 24px 60px;max-width:1400px;}

  /* ================= BUTTONS ================= */
  .btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border-strong);background:var(--surface);color:var(--text);padding:7px 13px;border-radius:var(--radius-sm);cursor:pointer;font-size:12.5px;font-weight:600;white-space:nowrap;}
  .btn:hover{border-color:var(--brand);color:var(--brand);}
  .btn-primary{background:var(--brand);border-color:var(--brand);color:var(--brand-contrast);}
  .btn-primary:hover{background:var(--brand-dark);border-color:var(--brand-dark);color:var(--brand-contrast);}
  .btn-danger{border-color:var(--crit-border);color:var(--crit);}
  .btn-danger:hover{background:var(--crit-bg);border-color:var(--crit);}
  .btn-ghost{border-color:transparent;background:transparent;}
  .btn-ghost:hover{background:var(--surface-alt);border-color:var(--border);color:var(--text);}
  .btn-sm{padding:4px 9px;font-size:11.5px;}
  .icon-btn{border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-dim);}
  .icon-btn:hover{border-color:var(--brand);color:var(--brand);}
  .icon-btn.danger:hover{border-color:var(--crit);color:var(--crit);background:var(--crit-bg);}
  .icon-btn svg{width:13px;height:13px;}

  /* ================= KPI ================= */
  .kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px;}
  @media (max-width:1100px){ .kpi-row{grid-template-columns:repeat(2,1fr);} }
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px 12px;border-top:3px solid var(--k-color,var(--brand));}
  .kpi .k-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-faint);font-weight:700;}
  .kpi .k-value{font-family:var(--font-mono);font-size:29px;font-weight:700;margin-top:6px;line-height:1;color:var(--k-color,var(--text));}
  .kpi .k-sub{font-size:11px;color:var(--text-faint);margin-top:6px;}

  .compliance-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:18px;}
  .compliance-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;gap:10px;flex-wrap:wrap;}
  .compliance-head h2{font-size:13.5px;font-weight:700;}
  .compliance-pct{font-family:var(--font-mono);font-size:22px;font-weight:700;}
  .compliance-track{height:14px;border-radius:20px;background:var(--surface-alt);border:1px solid var(--border);overflow:hidden;}
  .compliance-fill{height:100%;border-radius:20px;transition:width .3s ease;}
  .compliance-legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap;}
  .compliance-legend .li{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);}
  .compliance-legend .sw{width:9px;height:9px;border-radius:2px;}

  /* ================= PANEL ================= */
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:18px;}
  .panel-head{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .panel-head h2{font-size:13.5px;font-weight:700;}
  .panel-body{padding:14px 16px;}
  .panel-body.flush{padding:0;}

  /* ================= TAGS ================= */
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;letter-spacing:.4px;padding:3px 8px 3px 6px;border-radius:3px;border:1px solid;text-transform:uppercase;white-space:nowrap;font-family:var(--font-mono);}
  .tag .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex:none;}
  .tag-ok{color:var(--ok);background:var(--ok-bg);border-color:var(--ok-border);}
  .tag-warn{color:var(--warn);background:var(--warn-bg);border-color:var(--warn-border);}
  .tag-crit{color:var(--crit);background:var(--crit-bg);border-color:var(--crit-border);}
  .tag-oos{color:var(--oos);background:var(--oos-bg);border-color:var(--oos-border);}
  .crit-pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.3px;}
  .crit-high{background:var(--crit-bg);color:var(--crit);}
  .crit-medium{background:var(--warn-bg);color:var(--warn);}
  .crit-low{background:var(--surface-alt);color:var(--text-dim);border:1px solid var(--border);}
  .due-soon-flag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--warn);margin-left:6px;}

  /* ================= TOOLBAR / TABLE ================= */
  .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);}
  .search-box{position:relative;flex:1;min-width:180px;max-width:280px;}
  .search-box input{width:100%;padding:7px 10px 7px 28px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface-alt);color:var(--text);}
  .search-box svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--text-faint);}
  select.filter{min-width:130px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface-alt);color:var(--text);padding:7px 9px;}
  .toolbar-spacer{flex:1;}
  .table-wrap{overflow-x:auto;}
  table.data{width:100%;border-collapse:collapse;min-width:1520px;}
  table.data th{text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-faint);padding:9px 10px;border-bottom:1px solid var(--border);background:var(--surface-alt);white-space:nowrap;position:sticky;top:0;}
  table.data th.sortable{cursor:pointer;user-select:none;}
  table.data th.sortable:hover{color:var(--brand);}
  table.data th .arrow{margin-left:3px;opacity:.7;font-size:9px;}
  table.data td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:12px;}
  table.data tbody tr:hover{background:var(--surface-alt);}
  table.data tbody tr.row-crit{background:color-mix(in srgb, var(--crit-bg) 55%, transparent);}
  table.data tbody tr.row-warn{background:color-mix(in srgb, var(--warn-bg) 40%, transparent);}
  table.data tr.site-row{cursor:pointer;}
  table.data tr.site-row:hover{background:var(--brand-light);}
  .cell-tag{font-family:var(--font-mono);font-weight:700;font-size:11.5px;}
  .cell-name{font-weight:600;}
  .cell-sub{font-size:10.5px;color:var(--text-faint);}
  .row-actions{display:flex;gap:5px;justify-content:flex-end;}
  .empty-state{padding:40px 20px;text-align:center;color:var(--text-faint);font-size:12.5px;}

  /* ================= MODAL / FORM ================= */
  .overlay{position:fixed;inset:0;background:rgba(6,12,17,.5);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;z-index:100;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:680px;box-shadow:var(--shadow-modal);margin-bottom:40px;}
  .modal.wide{max-width:920px;}
  .modal-head{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--border);}
  .modal-head h3{font-size:14.5px;font-weight:700;}
  .modal-head .sub{font-size:11.5px;color:var(--text-faint);}
  .modal-body{padding:18px;max-height:70vh;overflow-y:auto;}
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:14px 18px;border-top:1px solid var(--border);flex-wrap:wrap;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px;}
  .form-grid.cols-3{grid-template-columns:1fr 1fr 1fr;}
  @media (max-width:600px){ .form-grid,.form-grid.cols-3{grid-template-columns:1fr;} }
  .field{display:flex;flex-direction:column;gap:5px;}
  .field.span-2{grid-column:span 2;}
  @media (max-width:600px){ .field.span-2{grid-column:span 1;} }
  .field label{font-size:10.5px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px;}
  .field .req{color:var(--crit);}
  .field .hint{font-size:10.5px;color:var(--text-faint);}
  .field input,.field select,.field textarea{border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface-alt);color:var(--text);padding:7px 9px;width:100%;}
  .field textarea{resize:vertical;min-height:56px;font-family:inherit;}
  .form-error{font-size:11px;color:var(--crit);margin-top:8px;padding:8px 10px;background:var(--crit-bg);border:1px solid var(--crit-border);border-radius:var(--radius-sm);}
  fieldset{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin:0 0 14px;}
  fieldset legend{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--brand);padding:0 6px;}

  /* ================= DASHBOARD EXTRAS ================= */
  .grid-2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;}
  @media (max-width:1000px){ .grid-2{grid-template-columns:1fr;} }
  .alert-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);}
  .alert-row:last-child{border-bottom:none;}
  .alert-row .a-main{flex:1;min-width:0;}
  .alert-row .a-tag{font-family:var(--font-mono);font-weight:700;font-size:12px;}
  .alert-row .a-name{font-size:11px;color:var(--text-faint);}
  .alert-row .a-days{font-family:var(--font-mono);font-size:11.5px;font-weight:700;}
  .area-row{display:flex;align-items:center;gap:10px;padding:8px 0;}
  .area-row .s-label{width:190px;flex:none;font-size:12px;font-weight:600;}
  .area-track{flex:1;height:8px;background:var(--surface-alt);border:1px solid var(--border);border-radius:20px;overflow:hidden;display:flex;}
  .area-seg{height:100%;}
  .area-row .s-count{width:40px;text-align:right;font-family:var(--font-mono);font-size:11.5px;color:var(--text-faint);}

  /* ================= SCHEDULE ================= */
  .range-tabs{display:flex;gap:6px;}
  .range-tabs button{border:1px solid var(--border-strong);background:var(--surface);color:var(--text-dim);padding:6px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;}
  .range-tabs button.active{background:var(--brand);border-color:var(--brand);color:var(--brand-contrast);}
  .task-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);}
  .task-row:last-child{border-bottom:none;}
  .task-row .t-date{width:82px;flex:none;font-family:var(--font-mono);font-size:11.5px;color:var(--text-dim);}
  .task-row .t-main{flex:1;min-width:0;}
  .task-row .t-tag{font-family:var(--font-mono);font-weight:700;font-size:12.5px;}
  .task-row .t-name{font-size:11px;color:var(--text-faint);}

  .cal-nav-btn{border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-dim);}
  .cal-nav-btn:hover{border-color:var(--brand);color:var(--brand);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
  .cal-dow{background:var(--surface-alt);padding:6px 0;text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-faint);font-weight:700;}
  .cal-cell{background:var(--surface);min-height:58px;padding:5px 6px;position:relative;}
  .cal-cell.out{background:var(--surface-alt);}
  .cal-cell.today{box-shadow:inset 0 0 0 2px var(--brand);}
  .cal-cell.has-events{cursor:pointer;}
  .cal-cell.selected{background:var(--brand-light);}
  .cal-cell .d-num{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);}
  .cal-cell.today .d-num{color:var(--brand);font-weight:700;}
  .cal-dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px;}
  .cal-dot{width:6px;height:6px;border-radius:50%;}
  .cal-legend{display:flex;gap:14px;padding-top:10px;flex-wrap:wrap;}

  /* ================= CERTIFICATE ================= */
  .certificate-container{background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius);padding:34px 38px;max-width:900px;margin:0 auto;}
  .cert-top{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px double var(--border-strong);padding-bottom:16px;margin-bottom:18px;}
  .cert-brand{display:flex;gap:12px;align-items:center;}
  .cert-brand .logo-mark{width:40px;height:40px;}
  .cert-brand h2{font-size:15px;font-weight:800;letter-spacing:.5px;color:var(--gray-dark);}
  .cert-brand .site-line{font-size:11px;color:var(--text-faint);}
  .cert-id-box{text-align:right;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);}
  .cert-id-box b{font-size:13px;color:var(--text);}
  .cert-title{text-align:center;margin:6px 0 22px;}
  .cert-title h1{font-size:18px;letter-spacing:1.5px;text-transform:uppercase;color:var(--brand);}
  .cert-title .subt{font-size:11px;color:var(--text-faint);letter-spacing:.5px;margin-top:3px;}
  .cert-section{margin-bottom:18px;}
  .cert-section h4{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--brand);margin:0 0 8px;border-bottom:1px solid var(--border);padding-bottom:5px;}
  .cert-kv{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;}
  .cert-kv .row{display:flex;justify-content:space-between;gap:10px;font-size:12px;border-bottom:1px dotted var(--border);padding:3px 0;}
  .cert-kv .row .k{color:var(--text-faint);}
  .cert-kv .row .v{font-family:var(--font-mono);font-weight:600;text-align:right;}

  var TODAY = new Date();
  TODAY.setHours(0,0,0,0);
  var TODAY_STR = TODAY.getFullYear() + "-" + String(TODAY.getMonth()+1).padStart(2,"0") + "-" + String(TODAY.getDate()).padStart(2,"0");
  function parseDate(s){ return new Date(s+"T00:00:00"); }
  function daysBetween(dateStr){ return Math.round((parseDate(dateStr) - TODAY) / 86400000); }
  function addMonths(dateStr, months){
    var d = parseDate(dateStr);
    var day = d.getDate();
    d.setDate(1);
    d.setMonth(d.getMonth() + Number(months));
    var lastDay = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
    d.setDate(Math.min(day, lastDay));
    return d.toISOString().slice(0,10);
  }
  function fmtDate(dateStr){
    if(!dateStr) return "—";
    return parseDate(dateStr).toLocaleDateString(T("dateLocale"), {day:"2-digit", month:"short", year:"numeric"});
  }
  function esc(str){
    return String(str==null?"":str).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  // Current status is exactly one of: Approved / Conditional / Out of Service / Overdue
  function currentStatus(eq){
    if(eq.manualStatus === "Out of Service") return "Out of Service";
    if(daysBetween(eq.nextCalibration) < 0) return "Overdue";
    return eq.manualStatus;
  }
  function isDueSoon(eq){
    var st = currentStatus(eq);
    if(st !== "Approved" && st !== "Conditional") return false;
    var d = daysBetween(eq.nextCalibration);
    return d >= 0 && d <= 30;
  }

  function withFocusPreserved(fn){
    var active = document.activeElement;
    var id = active && active.id;
    var selStart, selEnd;
    if(active && typeof active.selectionStart === "number"){ selStart = active.selectionStart; selEnd = active.selectionEnd; }
    fn();
    if(id){
      var el = document.getElementById(id);
      if(el){
        el.focus();
        if(selStart != null && el.setSelectionRange){ try{ el.setSelectionRange(selStart, selEnd); }catch(e){} }
      }
    }
  }

  function shellHtml(){
    var siteOptsByRegion = {};
    SITES.forEach(function(s){ (siteOptsByRegion[s.region] = siteOptsByRegion[s.region]||[]).push(s); });
    var regionOrder = ["SAM","NAM","Australia","Asia"];
    var siteOptionsHtml = regionOrder.map(function(r){
      var group = (siteOptsByRegion[r]||[]).map(function(s){
        return '<option value="'+s.id+'"'+(state.currentSite===s.id?" selected":"")+'>'+esc(s.name)+'</option>';
      }).join("");
      return '<optgroup label="'+esc(regionLabel(r))+'">'+group+'</optgroup>';
    }).join("");
    var langOptions = [["en","English"],["es","Español"],["zh","中文（普通话）"]].map(function(p){
      return '<option value="'+p[0]+'"'+(state.lang===p[0]?" selected":"")+'>'+esc(p[1])+'</option>';
    }).join("");

    return '' +
    '<header class="header">' +
      '<div class="logo-lockup">' + logoMarkSvg() +
        '<div class="logo-text"><b>BRADKEN</b><span>'+esc(T("appTitle"))+'</span></div>' +
      '</div>' +
      '<div class="header-spacer"></div>' +
      '<div class="header-right">' +
        '<div class="lang-select-wrap">' +
          '<label>'+esc(T("language"))+'</label>' +
          '<select class="lang-select" id="lang-select">'+langOptions+'</select>' +
        '</div>' +
        '<div class="site-select-wrap">' +
          '<label>'+esc(T("manufacturingSite"))+'</label>' +
          '<select class="site-select" id="site-select">'+siteOptionsHtml+'</select>' +
        '</div>' +
        '<div class="site-select-wrap">' +
          '<label>&nbsp;</label>' +
          '<div style="display:flex;align-items:center;gap:8px;">' +
            '<span class="cell-sub" title="'+esc(state.session&&state.session.user&&state.session.user.email||"")+'">'+esc((state.profile&&state.profile.fullName)||(state.session&&state.session.user&&state.session.user.email)||"")+' · '+esc(isAdmin()?T("roleAdmin"):T("roleMember"))+'</span>' +
            '<button type="button" class="btn btn-ghost btn-sm" data-action="sign-out">'+esc(T("authSignOut"))+'</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</header>' +
    '<div class="shell-body">' +
      '<aside class="sidebar"><nav class="nav">' +
        navItem("dashboard",T("navDashboard")) +
        navItem("equipment",T("navEquipment")) +
        navItem("events",T("navEvents")) +
        navItem("schedule",T("navSchedule")) +
        navItem("global",T("navGlobal")) +
      '</nav></aside>' +
      '<div class="main"><div class="view">' + viewHtml() + '</div></div>' +
    '</div>' +
    modalHtml() + toastHtml();
  }

  function navItem(view, label){
    var active = state.currentView === view;
    return '<button class="nav-item'+(active?" active":"")+'" data-action="nav" data-view="'+view+'">' +
      navIcon(view) + '<span>'+esc(label)+'</span></button>';
  }

  function viewHtml(){
    if(state.certificate) return certificateViewHtml(state.certificate);
    switch(state.currentView){
      case "equipment": return equipmentViewHtml();
      case "events": return eventsViewHtml();
      case "schedule": return scheduleViewHtml();
      case "global": return globalViewHtml();
      default: return dashboardViewHtml();
    }
  }

  /* =====================================================================
     DASHBOARD
  ===================================================================== */
  function dashboardViewHtml(){
    var scoped = scopedEquipment();
    var buckets = {Approved:[], Conditional:[], Overdue:[], "Out of Service":[]};
    scoped.forEach(function(eq){ buckets[currentStatus(eq)].push(eq); });
    var dueSoon = scoped.filter(isDueSoon);

    var activeCount = scoped.length - buckets["Out of Service"].length;
    var compliant = buckets.Approved.length;
    var pct = activeCount > 0 ? Math.round((compliant/activeCount)*100) : 0;
    var pctColor = pct >= 90 ? "var(--ok)" : pct >= 70 ? "var(--warn)" : "var(--crit)";

    var kpi = '<div class="kpi-row">' +
      kpiCard(T("kpiTotal"), scoped.length, "var(--text)") +
      kpiCard(T("kpiApproved"), buckets.Approved.length, "var(--ok)") +
      kpiCard(T("kpiDueSoon"), dueSoon.length, "var(--warn)") +
      kpiCard(T("kpiOverdue"), buckets.Overdue.length, "var(--crit)") +
      kpiCard(T("kpiOOS"), buckets["Out of Service"].length, "var(--oos)") +
    '</div>';

    var compliance = '<div class="compliance-panel">' +
      '<div class="compliance-head"><h2>'+esc(T("complianceTitle"))+' '+esc(siteName(state.currentSite))+'</h2><span class="compliance-pct" style="color:'+pctColor+'">'+pct+'%</span></div>' +
      '<div class="compliance-track"><div class="compliance-fill" style="width:'+pct+'%;background:'+pctColor+'"></div></div>' +
      '<div class="compliance-legend">' +
        legendItem("var(--ok)",statusLabel("Approved")) + legendItem("var(--warn)",statusLabel("Conditional")) +
        legendItem("var(--crit)",statusLabel("Overdue")) + legendItem("var(--oos)",statusLabel("Out of Service")) +
      '</div>' +
    '</div>';

    var alertList = buckets.Overdue.slice().sort(function(a,b){ return daysBetween(a.nextCalibration)-daysBetween(b.nextCalibration); })
      .concat(dueSoon.filter(function(e){ return e.criticality === "High"; }))
      .slice(0,8);
    var alertsHtml = alertList.length ? alertList.map(function(eq){
      var d = daysBetween(eq.nextCalibration);
      var st = currentStatus(eq);
      var dayStr = d < 0 ? Math.abs(d)+" "+T("daysOverdueSuffix") : (d===0 ? T("dueTodayLabel") : d+" "+T("daysSuffix"));
      return '<div class="alert-row">' + statusTagHtml(st) +
        '<div class="a-main"><div class="a-tag">'+esc(eq.tag)+'</div><div class="a-name">'+esc(eq.name)+' · '+esc(areaLabel(eq.area))+'</div></div>' +
        '<div class="a-days" style="color:'+(st==="Overdue"?"var(--crit)":"var(--warn)")+'">'+esc(dayStr)+'</div>' +
        '<button class="btn btn-sm" data-action="open-event" data-id="'+eq.id+'">'+esc(T("logEvent"))+'</button>' +
      '</div>';
    }).join("") : '<div class="empty-state">'+esc(T("noCriticalAlerts"))+'</div>';

    var areaMap = {};
    scoped.forEach(function(eq){ (areaMap[eq.area]=areaMap[eq.area]||[]).push(eq); });
    var areaRows = Object.keys(areaMap).sort().map(function(area){
      var list = areaMap[area];
      var b = {Approved:0, Conditional:0, Overdue:0, "Out of Service":0};

  function filteredSortedEquipment(){
    var q = state.searchQuery.trim().toLowerCase();
    var list = scopedEquipment().filter(function(eq){
      if(state.filters.status !== "all" && currentStatus(eq) !== state.filters.status) return false;
      if(state.filters.criticality !== "all" && eq.criticality !== state.filters.criticality) return false;
      if(state.filters.area !== "all" && eq.area !== state.filters.area) return false;
      if(q){
        var hay = (eq.id+" "+eq.tag+" "+eq.name+" "+eq.serial+" "+eq.manufacturer+" "+eq.model+" "+(eq.responsibleName||"")).toLowerCase();
        if(hay.indexOf(q) === -1) return false;
      }
      return true;
    });
    var key = state.sortKey, dir = state.sortDir === "asc" ? 1 : -1;
    list.sort(function(a,b){
      var va = a[key], vb = b[key];
      if(key === "criticality"){ var order = {High:3, Medium:2, Low:1}; va = order[a.criticality]; vb = order[b.criticality]; }
      if(va < vb) return -1*dir;
      if(va > vb) return 1*dir;
      return 0;
    });
    return list;
  }
  function sortArrow(key){ if(state.sortKey !== key) return ""; return '<span class="arrow">'+(state.sortDir==="asc"?"▲":"▼")+'</span>'; }

  function calendarEligible(eq){
    var st = currentStatus(eq);
    if(st === "Overdue") return "crit";
    if(isDueSoon(eq)) return "warn";
    return null;

  function scheduleViewHtml(){
    var scoped = scopedEquipment().filter(function(eq){ return currentStatus(eq) !== "Out of Service"; });
    var overdue = scoped.filter(function(eq){ return currentStatus(eq) === "Overdue"; })
      .sort(function(a,b){ return daysBetween(a.nextCalibration)-daysBetween(b.nextCalibration); });
    var within = scoped.filter(function(eq){ var d = daysBetween(eq.nextCalibration); return d >= 0 && d <= state.scheduleRange; })
      .sort(function(a,b){ return daysBetween(a.nextCalibration)-daysBetween(b.nextCalibration); });

    if(state.selectedDay){
      overdue = overdue.filter(function(eq){ return eq.nextCalibration === state.selectedDay; });
      within = within.filter(function(eq){ return eq.nextCalibration === state.selectedDay; });
    }

    function taskRow(eq){
      return '<div class="task-row">' +
        '<div class="t-date">'+esc(fmtDate(eq.nextCalibration))+'</div>' +
        '<div class="t-main"><div class="t-tag">'+esc(eq.tag)+'</div><div class="t-name">'+esc(eq.name)+' · '+esc(areaLabel(eq.area))+'</div></div>' +
        statusTagHtml(currentStatus(eq)) +

      '</div>';
    }
    var overdueHtml = overdue.length ? overdue.map(taskRow).join("") : '<div class="empty-state">'+esc(T("nothingOverdue"))+'</div>';
    var withinHtml = within.length ? within.map(taskRow).join("") : '<div class="empty-state">'+esc(T("nothingDueWindow"))+'</div>';

      '<div class="panel">' +
        '<div class="panel-head"><h2>'+esc(T("upcomingCalibrations"))+' '+esc(siteName(state.currentSite))+'</h2>' +
          '<div class="toolbar-spacer"></div>' +

        '</div>' +
        (state.selectedDay ? '<div class="toolbar"><div class="cell-sub">'+esc(T("filteredTo"))+' <strong class="mono">'+esc(fmtDate(state.selectedDay))+'</strong></div><div class="toolbar-spacer"></div><button class="btn btn-sm btn-ghost" data-action="clear-day">'+esc(T("clear"))+'</button></div>' : '') +
        '<div class="panel-body flush">'+withinHtml+'</div>' +

    var calendar = '<div class="panel">' +
      '<div class="panel-head"><h2>'+esc(T("calibrationCalendar"))+' '+esc(siteName(state.currentSite))+'</h2>' +
        '<div class="toolbar-spacer"></div>' +
        '<button class="cal-nav-btn" data-action="cal-prev" aria-label="Previous month"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 6l-6 6 6 6"/></svg></button>' +
        '<button class="cal-nav-btn" data-action="cal-next" aria-label="Next month"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></button>' +
      '</div>' +
      '<div class="panel-body">' + calendarHtml(scoped) + '</div>' +
    '</div>';

    return '<div class="grid-2"><div>'+lists+'</div>'+calendar+'</div>';
  }

  function calendarHtml(scoped){
    var base = new Date(TODAY.getFullYear(), TODAY.getMonth() + state.calendarMonthOffset, 1);
    var year = base.getFullYear(), month = base.getMonth();
    var firstDow = new Date(year, month, 1).getDay();
    var daysInMonth = new Date(year, month+1, 0).getDate();
    var prevDays = new Date(year, month, 0).getDate();

    var eventsByDay = {};
    scoped.forEach(function(eq){
      var c = calendarEligible(eq);
      if(!c) return;
      (eventsByDay[eq.nextCalibration] = eventsByDay[eq.nextCalibration] || []).push(c);
    });

    var monthLabel = base.toLocaleDateString(T("dateLocale"), {month:"long", year:"numeric"});
    var dows = STR[state.lang] ? STR[state.lang].dows : STR.en.dows;

    var cells = "";
    for(var i=0;i<firstDow;i++){
      var pd = prevDays - firstDow + 1 + i;
      cells += '<div class="cal-cell out"><div class="d-num">'+pd+'</div></div>';
    }
    for(var d=1; d<=daysInMonth; d++){
      var mm = String(month+1).padStart(2,"0"), dd = String(d).padStart(2,"0");
      var dateStr = year+"-"+mm+"-"+dd;
      var isToday = dateStr === TODAY_STR;
      var evs = eventsByDay[dateStr] || [];
      var selected = state.selectedDay === dateStr;
      var dots = evs.slice(0,4).map(function(c){
        return '<span class="cal-dot" style="background:'+(c==="crit"?"var(--crit)":"var(--warn)")+'"></span>';
      }).join("");
      cells += '<div class="cal-cell'+(isToday?" today":"")+(evs.length?" has-events":"")+(selected?" selected":"")+'"' +
        (evs.length ? ' data-action="select-day" data-day="'+dateStr+'"' : '') + '>' +
        '<div class="d-num">'+d+'</div>' + (dots ? '<div class="cal-dots">'+dots+'</div>' : '') +
      '</div>';
    }
    var totalCells = firstDow + daysInMonth;
    var trailing = (7 - (totalCells % 7)) % 7;
    for(var t=1;t<=trailing;t++){ cells += '<div class="cal-cell out"><div class="d-num">'+t+'</div></div>'; }

    return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><strong style="text-transform:capitalize;font-size:13px;">'+esc(monthLabel)+'</strong></div>' +
      '<div class="cal-grid">' + dows.map(function(x){ return '<div class="cal-dow">'+esc(x)+'</div>'; }).join("") + cells + '</div>' +
      '<div class="cal-legend">' + legendItem("var(--warn)",T("dueSoonLegend")) + legendItem("var(--crit)",T("overdueLegend")) + '</div>';
  }

  /* =====================================================================
     ALL SITES OVERVIEW (global, cross-site — ignores the site selector)
  ===================================================================== */
  function globalViewHtml(){
    var siteStats = SITES.map(function(s){
      var list = state.equipment.filter(function(eq){ return eq.siteId === s.id; });
      var buckets = {Approved:0, Conditional:0, Overdue:0, "Out of Service":0};
      list.forEach(function(eq){ buckets[currentStatus(eq)]++; });
      var dueSoon = list.filter(isDueSoon).length;
      var active = list.length - buckets["Out of Service"];
      var pct = active > 0 ? Math.round((buckets.Approved/active)*100) : null;
      return {site:s, total:list.length, approved:buckets.Approved, conditional:buckets.Conditional, dueSoon:dueSoon, overdue:buckets.Overdue, oos:buckets["Out of Service"], pct:pct};
    });

    var totalAll = state.equipment.length;
    var approvedAll = siteStats.reduce(function(s,r){ return s+r.approved; }, 0);
    var dueSoonAll = siteStats.reduce(function(s,r){ return s+r.dueSoon; }, 0);
    var overdueAll = siteStats.reduce(function(s,r){ return s+r.overdue; }, 0);
    var oosAll = siteStats.reduce(function(s,r){ return s+r.oos; }, 0);

    var kpi = '<div class="kpi-row">' +
      kpiCard(T("kpiNetworkTotal"), totalAll, "var(--text)") +
      kpiCard(T("kpiApprovedNetwork"), approvedAll, "var(--ok)") +
      kpiCard(T("kpiDueSoon"), dueSoonAll, "var(--warn)") +
      kpiCard(T("kpiOverdue"), overdueAll, "var(--crit)") +
      kpiCard(T("kpiOOS"), oosAll, "var(--oos)") +
    '</div>';

    var regionOrder = ["SAM","NAM","Australia","Asia"];
    var bodyRows = regionOrder.map(function(r){
      var group = siteStats.filter(function(x){ return x.site.region === r; });
      var groupHead = '<tr><td colspan="7" style="background:var(--surface-alt);font-size:10px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;color:var(--text-dim);padding:7px 10px;">'+esc(regionLabel(r))+'</td></tr>';
      var groupBody = group.map(function(x){
        var pctColor = x.pct == null ? "var(--text-faint)" : x.pct >= 90 ? "var(--ok)" : x.pct >= 70 ? "var(--warn)" : "var(--crit)";
        var isCurrent = x.site.id === state.currentSite;
        return '<tr class="site-row" data-action="goto-site" data-site="'+x.site.id+'">' +
          '<td class="cell-name">'+esc(x.site.name)+(isCurrent?' <span class="cell-sub">'+esc(T("selectedTag"))+'</span>':'')+'</td>' +
          '<td class="mono">'+x.total+'</td>' +
          '<td class="mono" style="color:var(--ok)">'+x.approved+'</td>' +
          '<td class="mono" style="color:var(--warn)">'+x.dueSoon+'</td>' +
          '<td class="mono" style="color:'+(x.overdue>0?"var(--crit)":"var(--text-faint)")+';font-weight:'+(x.overdue>0?"700":"400")+'">'+x.overdue+'</td>' +
          '<td class="mono" style="color:var(--oos)">'+x.oos+'</td>' +
          '<td class="mono" style="color:'+pctColor+';font-weight:700">'+(x.pct==null?"—":x.pct+"%")+'</td>' +
        '</tr>';
      }).join("");
      return groupHead + groupBody;
    }).join("");

    var table = '<div class="panel">' +
      '<div class="panel-head"><h2>'+esc(T("siteCompliance"))+'</h2><div class="cell-sub">'+esc(T("clickRowToSwitch"))+'</div></div>' +
      '<div class="table-wrap"><table class="data"><thead><tr>' +
        '<th>'+esc(T("colSite"))+'</th><th>'+esc(T("colTotal"))+'</th><th>'+esc(statusLabel("Approved"))+'</th><th>'+esc(T("colDueSoon"))+'</th><th>'+esc(statusLabel("Overdue"))+'</th><th>'+esc(statusLabel("Out of Service"))+'</th><th>'+esc(T("colCompliance"))+'</th>' +
      '</tr></thead><tbody>'+bodyRows+'</tbody></table></div>' +
    '</div>';

    var overdueAllList = state.equipment.filter(function(eq){ return currentStatus(eq) === "Overdue"; })
      .sort(function(a,b){ return daysBetween(a.nextCalibration)-daysBetween(b.nextCalibration); });
    var alertsHtml = overdueAllList.length ? overdueAllList.map(function(eq){
      var d = Math.abs(daysBetween(eq.nextCalibration));
      return '<div class="alert-row">' + statusTagHtml("Overdue") +
        '<div class="a-main"><div class="a-tag">'+esc(eq.tag)+'</div><div class="a-name">'+esc(eq.name)+' · '+esc(siteName(eq.siteId))+'</div></div>' +
        '<div class="a-days" style="color:var(--crit)">'+d+' '+esc(T("daysOverdueSuffix"))+'</div>' +
        '<button class="btn btn-sm" data-action="goto-site" data-site="'+eq.siteId+'">'+esc(T("goToSite"))+'</button>' +
      '</div>';
    }).join("") : '<div class="empty-state">'+esc(T("noOverdueNetwork"))+'</div>';

    var alertsPanel = '<div class="panel"><div class="panel-head"><h2>'+esc(T("networkAlerts"))+'</h2></div><div class="panel-body flush">'+alertsHtml+'</div></div>';

    return kpi + table + alertsPanel;
  }

  /* =====================================================================
     EVENT HANDLING (delegated)
  ===================================================================== */
  function findEq(id){ return state.equipment.filter(function(e){ return e.id === id; })[0]; }

  app.addEventListener("click", function(e){
    var overlay = e.target.closest(".overlay");
    if(overlay && e.target === overlay){ closeModal(); return; }

    var t = e.target.closest("[data-action]");
    if(!t) return;
    var action = t.dataset.action;

    switch(action){
      case "nav":
        state.currentView = t.dataset.view; state.certificate = null; render();
        break;
      case "open-add-equipment":
        state.formError = null; state.modal = {type:"equipment", data:null}; render();
        break;
      case "edit-equipment": {
        var editEq = findEq(t.dataset.id);
        state.formError = null;
        state.modal = {type:"equipment", data: editEq, readOnly: !canEditEq(editEq)};
        render();
        break;
      }
      case "view-equipment":
        state.formError = null;
        state.modal = {type:"equipment", data: findEq(t.dataset.id), readOnly: true};
        render();
        break;
      case "delete-equipment":
        state.modal = {type:"confirm-delete", data: findEq(t.dataset.id)}; render();
        break;
      case "confirm-delete-equipment":
        deleteEquipment(t.dataset.id);
        break;
      case "close-modal":
        closeModal();
        break;
      case "open-event": {
        var fallback = filteredSortedEquipment()[0] || scopedEquipment()[0];
        state.formError = null;
        state.modal = {type:"event", data:{eqId: t.dataset.id || (fallback && fallback.id)}};
        render();
        break;
      }
      case "sort":
        if(state.sortKey === t.dataset.key){ state.sortDir = state.sortDir === "asc" ? "desc" : "asc"; }
        else { state.sortKey = t.dataset.key; state.sortDir = "asc"; }
        render();
        break;
      case "view-cert":
        openCertificate(t.dataset.eq, t.dataset.ev);
        break;
      case "close-certificate":
        state.certificate = null; render();
        break;
      case "print-cert":
        window.print();
        break;
      case "set-range":
        state.scheduleRange = Number(t.dataset.range); render();
        break;
      case "cal-prev":
        state.calendarMonthOffset--; render();
        break;
      case "cal-next":
        state.calendarMonthOffset++; render();
        break;
      case "select-day":
        state.selectedDay = state.selectedDay === t.dataset.day ? null : t.dataset.day; render();
        break;
      case "clear-day":
        state.selectedDay = null; render();
        break;
      case "goto-site":
        state.currentSite = t.dataset.site; state.currentView = "dashboard"; state.certificate = null; render();
        break;
      case "toggle-auth-mode":
        state.authMode = state.authMode === "signup" ? "login" : "signup";
        state.authError = null; state.authNotice = null; render();
        break;
      case "sign-out":
        sb.auth.signOut();
        break;
      case "retry-load":
        loadData();
        break;
    }
  });

  app.addEventListener("change", function(e){
    var el = e.target;
    if(el.id === "site-select"){ state.currentSite = el.value; render(); return; }
    if(el.id === "lang-select"){ state.lang = el.value; render(); return; }
    if(el.dataset.bind === "filter-status"){ state.filters.status = el.value; render(); return; }
    if(el.dataset.bind === "filter-criticality"){ state.filters.criticality = el.value; render(); return; }
    if(el.dataset.bind === "filter-area"){ state.filters.area = el.value; render(); return; }
    if(el.id === "event-eq-select"){
      var eq = findEq(el.value);
      if(eq && state.modal){ state.modal.data = {eqId: eq.id}; render(); }
      return;
    }
    if(el.id === "event-caltype-select"){
      if(state.modal){ state.modal.data = state.modal.data || {}; state.modal.data.calType = el.value; render(); }
      return;
    }
  });

  app.addEventListener("input", function(e){
    if(e.target.id === "search-input"){ state.searchQuery = e.target.value; render(); return; }
    if(e.target.id === "delete-confirm-input"){
      var btn = document.getElementById("confirm-delete-btn");
      if(btn) btn.disabled = (e.target.value !== e.target.dataset.expect);
      return;
    }
  });

  app.addEventListener("submit", function(e){
    e.preventDefault();
    if(e.target.id === "equipment-form") saveEquipmentForm(e.target);
    else if(e.target.id === "event-form") saveEventForm(e.target);
    else if(e.target.id === "auth-form") submitAuthForm(e.target);

  function submitAuthForm(form){
    var fd = new FormData(form);
    var email = (fd.get("email")||"").trim();
    var password = fd.get("password")||"";
    var isSignup = state.authMode === "signup";
    state.authError = null; state.authNotice = null; state.authBusy = true; render();

    var p = isSignup
      ? sb.auth.signUp({ email: email, password: password, options: { data: { full_name: (fd.get("fullName")||"").trim() } } })
      : sb.auth.signInWithPassword({ email: email, password: password });

    p.then(function(res){
      state.authBusy = false;
      if(res.error){ state.authError = res.error.message; render(); return; }
      if(isSignup && !(res.data && res.data.session)){
        state.authNotice = T("authCheckEmail");
        state.authMode = "login";
        render();
        return;
      }
      // onAuthStateChange handles the session + data load.
      render();
    });
  }

  function closeModal(){ state.modal = null; state.formError = null; render(); }

  function saveEquipmentForm(form){
    var fd = new FormData(form);
    var existingId = form.dataset.id;
    var code = (fd.get("code")||"").trim();
    var required = ["code","tag","name","manufacturer","model","serial","siteId","unit","rangeMin","rangeMax","emp","frequencyMonths","lastCalibration","responsibleName","responsibleEmail"];
    for(var i=0;i<required.length;i++){
      var val = fd.get(required[i]);
      if(val == null || String(val).trim() === ""){
        state.formError = T("errRequired");
        render();
        return;
      }
    }
    if(!existingId && findEq(code)){
      state.formError = T("errDuplicateId");
      render();
      return;
    }
    var emailVal = fd.get("responsibleEmail").trim();
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)){
      state.formError = T("errInvalidEmail");
      render();
      return;
    }

    var data = {
      tag: fd.get("tag").trim(),
      name: fd.get("name").trim(),
      manufacturer: fd.get("manufacturer").trim(),
      model: fd.get("model").trim(),
      serial: fd.get("serial").trim(),
      siteId: fd.get("siteId"),
      unit: fd.get("unit").trim(),
      rangeMin: Number(fd.get("rangeMin")),
      rangeMax: Number(fd.get("rangeMax")),
      emp: fd.get("emp").trim(),
      area: fd.get("area"),
      criticality: fd.get("criticality"),
      frequencyMonths: Number(fd.get("frequencyMonths")),
      lastCalibration: fd.get("lastCalibration"),
      manualStatus: fd.get("manualStatus"),
      responsibleName: fd.get("responsibleName").trim(),
      responsibleEmail: emailVal
    };
    data.nextCalibration = addMonths(data.lastCalibration, data.frequencyMonths);

    var row = eqToRow(data);
    var p = existingId
      ? sb.from("equipment").update(row).eq("id", existingId)
      : sb.from("equipment").insert(Object.assign({id: code}, row));

    p.then(function(res){
      if(res.error){ state.formError = res.error.message; render(); return; }
      if(existingId){
        var eq = findEq(existingId);
        Object.assign(eq, data);
      } else {
        data.id = code;
        data.tech = ""; data.traceCert = ""; data.uncertainty = "";
        data.calibrationHistory = [];
        data.createdBy = state.session.user.id;
        state.equipment.push(data);
      }
      // Keep the saved equipment visible even if it was assigned to a different manufacturing site.
      state.currentSite = data.siteId;
      state.modal = null; state.formError = null;
      render();
      showToast(T("toastEquipmentSaved"));
    });
  }

  function deleteEquipment(id){
    sb.from("equipment").delete().eq("id", id).then(function(res){
      if(res.error){ state.formError = res.error.message; render(); return; }
      state.equipment = state.equipment.filter(function(e){ return e.id !== id; });
      state.modal = null; render(); showToast(T("toastEquipmentDeleted"));
    });
  }

  function saveEventForm(form){
    var fd = new FormData(form);
    var eqId = fd.get("eqId");
    var eq = findEq(eqId);
    if(!eq) return;
    var calType = fd.get("calibrationType");
    var required = ["date","calibrationType","performedBy","traceCert","errorFound","verdict","qaApprover"];
    if(calType === "External") required.push("provider");
    for(var i=0;i<required.length;i++){
      var val = fd.get(required[i]);
      if(val == null || String(val).trim() === ""){
        state.formError = T("errRequired");
        render();
        return;
      }
    }

    var date = fd.get("date");
    var verdict = fd.get("verdict");
    var providerVal = calType === "External" ? fd.get("provider").trim() : ("Internal — " + siteName(eq.siteId) + " Metrology Team");
    var event = {
      date: date,
      calibrationType: calType,
      performedBy: fd.get("performedBy").trim(),
      provider: providerVal,
      traceCert: fd.get("traceCert").trim(),
      errorFound: fd.get("errorFound").trim(),
      uncertainty: fd.get("uncertainty").trim(),
      verdict: verdict,
      qaApprover: fd.get("qaApprover").trim(),
      certificateId: nextCertId(eq.siteId, date)
    };
    var nextCal = addMonths(date, eq.frequencyMonths);
    var newStatus = verdict === "PASS" ? "Approved" : "Out of Service";

    var eventRow = {
      equipment_id: eq.id, date: event.date, calibration_type: event.calibrationType,
      performed_by: event.performedBy, provider: event.provider, trace_cert: event.traceCert,
      error_found: event.errorFound, uncertainty: event.uncertainty, verdict: event.verdict,
      qa_approver: event.qaApprover, certificate_id: event.certificateId
    };

    sb.from("calibration_events").insert(eventRow).select().single().then(function(res){
      if(res.error){ state.formError = res.error.message; render(); return; }
      event.id = res.data.id;
      return sb.from("equipment").update({
        last_calibration: date, next_calibration: nextCal, manual_status: newStatus
      }).eq("id", eq.id).then(function(res2){
        if(res2.error){ state.formError = res2.error.message; render(); return; }
        eq.calibrationHistory = eq.calibrationHistory || [];
        eq.calibrationHistory.unshift(event);
        eq.lastCalibration = date;
        eq.nextCalibration = nextCal;
        eq.manualStatus = newStatus;
        eq.tech = event.provider; eq.traceCert = event.traceCert; eq.uncertainty = event.uncertainty;

        state.modal = null; state.formError = null;
        openCertificate(eq.id, event.id);
      });
    });
  }

  function openCertificate(eqId, evId){
    var eq = findEq(eqId);
    if(!eq) return;
    var ev = (eq.calibrationHistory||[]).filter(function(h){ return h.id === evId; })[0];
    if(!ev) return;
    state.certificate = {equipment: eq, event: ev};
    state.currentView = "events";
    render();
  }

  /* =====================================================================
     INIT
  ===================================================================== */
  function loadProfile(userId){
    return sb.from("profiles").select("*").eq("id", userId).single().then(function(res){
      if(res.error){ state.profile = null; return; }
      state.profile = { id: res.data.id, email: res.data.email, fullName: res.data.full_name, role: res.data.role };
    });
  }

  function loadData(){
    state.dataLoading = true; state.loadError = null; render();
    return Promise.all([
      sb.from("equipment").select("*"),
      sb.from("calibration_events").select("*").order("date", {ascending:false})
    ]).then(function(results){
      var eqRes = results[0], evRes = results[1];
      if(eqRes.error) throw eqRes.error;
      if(evRes.error) throw evRes.error;
      var equipment = eqRes.data.map(eqFromRow);
      var byEqId = {};
      equipment.forEach(function(eq){ byEqId[eq.id] = eq; });
      evRes.data.forEach(function(row){
        var eq = byEqId[row.equipment_id];
        if(!eq) return;
        eq.calibrationHistory.push(evFromRow(row));
      });
      equipment.forEach(function(eq){
        if(eq.calibrationHistory.length){
          var latest = eq.calibrationHistory[0];
          eq.tech = latest.provider; eq.traceCert = latest.traceCert; eq.uncertainty = latest.uncertainty;
        }
      });
      state.equipment = equipment;
      state.dataLoading = false;
      render();
    }).catch(function(err){
      state.dataLoading = false;
      state.loadError = (err && err.message) || String(err);
      render();
    });
  }

  function onSignedOut(){
    state.session = null; state.profile = null; state.equipment = []; state.dataLoading = false;
    render();
  }

  render();

  sb.auth.onAuthStateChange(function(_event, session){
    if(session){
      var isNewUser = !state.session || state.session.user.id !== session.user.id;
      state.session = session;
      if(isNewUser){
        render();
        loadProfile(session.user.id).then(loadData);
      }
    } else if(state.session){
      onSignedOut();
    } else {
      state.session = null; render();
    }
  });
})();
</script>
